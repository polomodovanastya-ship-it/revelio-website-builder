name: Deploy to revelio.tech

on:
  push:
    branches: [main]

concurrency:
  group: deploy-revelio-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static export
        run: STATIC_EXPORT=1 bun run build

      - name: Prune disabled research pages
        run: |
          grep -q 'RESEARCH_ENABLED = false' lib/reports.ts && rm -rf out/research && echo "research disabled — pruned out/research" || true

      - name: Set up deploy SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/known_hosts <<'EOF'
          [186.246.7.44]:2222 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBIR9D8EC8OI60Xvbx17FPYthuf1hWNA7Z7e2vyemjEOBDt1Hsu6mVdyneWGT6oprPx0iy8SuHwvVAUdpfzPGPOA=
          [186.246.7.44]:2222 ssh-rsa 
          [186.246.7.44]:2222 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIrbif3zIqFwSRa6Z3wLmLyiJycc/gyNTBItoPPPQ8+p
          EOF
          chmod 600 ~/.ssh/known_hosts

      - name: Backup remote web root
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 root@186.246.7.44 \
            'cp -a /home/web/revelio-static /home/web/revelio-static.bak-$(date +%Y%m%d-%H%M%S)'

      - name: Deploy
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 2222" \
            --exclude='/test-form.html' --exclude='.DS_Store' \
            out/ root@186.246.7.44:/home/web/revelio-static/
